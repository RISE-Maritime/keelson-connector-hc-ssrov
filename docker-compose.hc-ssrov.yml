services:

  # ROV Hand Controller to Keelson
  hc-ssrov-to-keelson:
    build: .
    # image: ghcr.io/rise-maritime/keelson-connector-hc-ssrov:latest
    container_name: keelson-connector-hc-ssrov
    restart: unless-stopped
    network_mode: "host"
    privileged: true
    devices:
      - /dev/input/js0:/dev/input/js0
    command: ["hcssrov2keelson --log-level 20 -r rise -e rov -s controller/hc --device /dev/input/js0"]

  # Alternative: Connect to specific Zenoh router
  hc-ssrov-to-keelson-client:
    build: .
    # image: ghcr.io/rise-maritime/keelson-connector-hc-ssrov:latest
    container_name: keelson-connector-hc-ssrov-client
    restart: unless-stopped
    network_mode: "host"
    privileged: true
    devices:
      - /dev/input/js0:/dev/input/js0
    command: ["hcssrov2keelson --log-level 20 -r rise -e rov -s controller/hc --device /dev/input/js0 --mode client --connect tcp/localhost:7447"]
    profiles: ["client"]