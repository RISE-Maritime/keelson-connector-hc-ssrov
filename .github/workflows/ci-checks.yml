name: CI checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linting-bash:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run ShellCheck
        run: |
          # shellcheck is preinstalled on ubuntu-latest runners.
          # Discover shell scripts; pass cleanly if none exist.
          mapfile -t scripts < <(find . -type f \( -name '*.sh' -o -name '*.bash' \) -not -path './.git/*')
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "No shell scripts to lint."
            exit 0
          fi
          printf 'Linting:\n%s\n' "${scripts[@]}"
          shellcheck "${scripts[@]}"

  linting-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dev dependencies
        run: pip install ".[dev]"
      - name: Run black
        run: black --check bin/*
      - name: Run pylint
        run: pylint bin/*

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dev dependencies
        run: pip install ".[dev]"
      - name: Run pytest
        run: pytest tests/ -v
