  # Alternative: Connect to specific Zenoh router
  # hc-to-keelson-client:
  #   build: .
  #   # image: ghcr.io/rise-maritime/keelson-connector-hand-controller:latest
  #   container_name: keelson-connector-hc-client
  #   restart: unless-stopped
  #   network_mode: "host"
  #   privileged: true
  #   devices:
  #     - /dev/input/js0:/dev/input/js0
  #   command: ["hc2keelson --log-level 20 -r rise -e rov --device /dev/input/js0 --mode client --connect tcp/localhost:7447"]
  #   profiles: ["client"]

  # Cross-platform relay mode (macOS/Windows/Linux)
  # Requires hid_relay.py running on the host: python bin/hid_relay.py --port 9090
  hc-to-keelson-relay:
    build: .
    container_name: keelson-connector-hc-relay
    restart: unless-stopped
    network_mode: "host"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["hc2keelson --log-level 10 -r rise -e rov --relay host.docker.internal:9090"]
    # profiles: ["relay"]

  # Cross-platform relay mode + client Zenoh connection
  # hc-to-keelson-relay-client:
  #   build: .
  #   container_name: keelson-connector-hc-relay-client
  #   restart: unless-stopped
  #   network_mode: "host"
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   command: ["hc2keelson --log-level 20 -r rise -e rov --relay host.docker.internal:9090 --mode client --connect tcp/localhost:7447"]
  #   profiles: ["relay-client"]

  # Logitech F310/F710 gamepad - relay mode (macOS/Windows/Linux)
  # Requires separate relay on host: python bin/hid_relay.py --no-mfi --port 9091
  # (--no-mfi is needed on macOS because GCController exclusively claims the Logitech)
  logitech-to-keelson-relay:
    build: .
    container_name: keelson-connector-logitech-relay
    restart: unless-stopped
    network_mode: "host"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["hc2keelson --log-level 10 -r rise -e rov --controller logitech --relay host.docker.internal:9091"]
    # profiles: ["logitech-relay"]