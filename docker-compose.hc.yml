  #   build: .
  #   # image: ghcr.io/rise-maritime/keelson-connector-hand-controller:latest
  #   container_name: keelson-connector-hc
  #   restart: unless-stopped
  #   network_mode: "host"
  #   privileged: true
  #   devices:
  #     - /dev/input/js0:/dev/input/js0
